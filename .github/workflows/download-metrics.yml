name: Download Metrics

permissions:
  discussions: write
  contents: read

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  download-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: get-metrics
        id: get-metrics
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "kubeui-download-metrics-workflow"
          }

          $releases = @()
          $page = 1
          $perPage = 100

          do {
            $url = "https://api.github.com/repos/$repo/releases?per_page=$perPage&page=$page"
            $batch = Invoke-RestMethod -Uri $url -Headers $headers

            if ($batch) {
              $releases += $batch
            }

            $page++
          } while ($batch -and $batch.Count -eq $perPage)

          Write-Host "Fetched $($releases.Count) releases"
          $osArchMetrics = @{
            Windows_x64 = 0
            Windows_arm64 = 0
            Linux_x64 = 0
            Linux_arm64 = 0
            macOS_x64 = 0
            macOS_arm64 = 0
          }

          $now = (Get-Date).ToUniversalTime()
          $weekCurrentStart = $now.AddDays(-7)
          $weekPreviousStart = $now.AddDays(-14)
          $monthCurrentStart = $now.AddDays(-30)
          $monthPreviousStart = $now.AddDays(-60)
          $yearCurrentStart = $now.AddDays(-365)
          $yearPreviousStart = $now.AddDays(-730)

          $weeklyDownloads = 0
          $weeklyPreviousDownloads = 0
          $monthlyDownloads = 0
          $monthlyPreviousDownloads = 0
          $yearlyDownloads = 0
          $yearlyPreviousDownloads = 0

          foreach ($release in $releases) {
            $releasePublishedAt = ([datetime]$release.published_at).ToUniversalTime()
            foreach ($asset in $release.assets) {
              $name = $asset.name.ToLower()
              if ($name -match '^releases.*\.json$') { continue }

              $downloadCount = [int]$asset.download_count

              if ($releasePublishedAt -ge $weekCurrentStart) {
                $weeklyDownloads += $downloadCount
              } elseif ($releasePublishedAt -ge $weekPreviousStart) {
                $weeklyPreviousDownloads += $downloadCount
              }

              if ($releasePublishedAt -ge $monthCurrentStart) {
                $monthlyDownloads += $downloadCount
              } elseif ($releasePublishedAt -ge $monthPreviousStart) {
                $monthlyPreviousDownloads += $downloadCount
              }

              if ($releasePublishedAt -ge $yearCurrentStart) {
                $yearlyDownloads += $downloadCount
              } elseif ($releasePublishedAt -ge $yearPreviousStart) {
                $yearlyPreviousDownloads += $downloadCount
              }

              # Normalize common architecture and OS name variants
              $isWindows = ($name -like '*win*' -or $name -like '*windows*')
              $isLinux = ($name -like '*linux*')
              $isMac = ($name -like '*mac*' -or $name -like '*darwin*' -or $name -like '*osx*')

              $isX64 = ($name -like '*x64*' -or $name -like '*x86_64*' -or $name -like '*amd64*')
              $isArm64 = ($name -like '*arm64*' -or $name -like '*aarch64*')

              if ($isWindows -and $isX64) {
                $osArchMetrics.Windows_x64 += $downloadCount
              } elseif ($isWindows -and $isArm64) {
                $osArchMetrics.Windows_arm64 += $downloadCount
              } elseif ($isLinux -and $isX64) {
                $osArchMetrics.Linux_x64 += $downloadCount
              } elseif ($isLinux -and $isArm64) {
                $osArchMetrics.Linux_arm64 += $downloadCount
              } elseif ($isMac -and $isX64) {
                $osArchMetrics.macOS_x64 += $downloadCount
              } elseif ($isMac -and $isArm64) {
                $osArchMetrics.macOS_arm64 += $downloadCount
              }
            }
          }

          function Get-TrendLabel([int]$current, [int]$previous) {
            if ($current -gt $previous) { return 'up' }
            if ($current -lt $previous) { return 'down' }
            return 'flat'
          }

          function Get-ChangePercent([int]$current, [int]$previous) {
            if ($previous -eq 0) {
              if ($current -eq 0) { return '0.0%' }
              return 'n/a'
            }

            $pct = (($current - $previous) / [double]$previous) * 100
            return ('{0:N1}%' -f $pct)
          }

          Write-Host "Download Metrics by OS and Architecture:"
          $totalDownloads =
            $osArchMetrics.Windows_x64 +
            $osArchMetrics.Windows_arm64 +
            $osArchMetrics.Linux_x64 +
            $osArchMetrics.Linux_arm64 +
            $osArchMetrics.macOS_x64 +
            $osArchMetrics.macOS_arm64
          $metricsTable = "| Platform | Architecture | Downloads |`n|---|---|---|"
          $metricsTable += "`n| Windows | x64 | $($osArchMetrics.Windows_x64) |"
          $metricsTable += "`n| Windows | arm64 | $($osArchMetrics.Windows_arm64) |"
          $metricsTable += "`n| Linux | x64 | $($osArchMetrics.Linux_x64) |"
          $metricsTable += "`n| Linux | arm64 | $($osArchMetrics.Linux_arm64) |"
          $metricsTable += "`n| macOS | x64 | $($osArchMetrics.macOS_x64) |"
          $metricsTable += "`n| macOS | arm64 | $($osArchMetrics.macOS_arm64) |"
          $metricsTable += "`n| Total | all | $totalDownloads |"

          $statsTable = "| Period | Downloads | Previous Period | Trend | Change |`n|---|---|---|---|---|"
          $statsTable += "`n| Weekly (7d) | $weeklyDownloads | $weeklyPreviousDownloads | $(Get-TrendLabel -current $weeklyDownloads -previous $weeklyPreviousDownloads) | $(Get-ChangePercent -current $weeklyDownloads -previous $weeklyPreviousDownloads) |"
          $statsTable += "`n| Monthly (30d) | $monthlyDownloads | $monthlyPreviousDownloads | $(Get-TrendLabel -current $monthlyDownloads -previous $monthlyPreviousDownloads) | $(Get-ChangePercent -current $monthlyDownloads -previous $monthlyPreviousDownloads) |"
          $statsTable += "`n| Yearly (365d) | $yearlyDownloads | $yearlyPreviousDownloads | $(Get-TrendLabel -current $yearlyDownloads -previous $yearlyPreviousDownloads) | $(Get-ChangePercent -current $yearlyDownloads -previous $yearlyPreviousDownloads) |"

          Write-Host $metricsTable
          Write-Host "Download Stats and Trends:"
          Write-Host $statsTable

          $output = "$metricsTable`n`n$statsTable"
          Set-Content -Path body.md -Value $output -Encoding UTF8

      - name: List all discussions (troubleshoot)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $url = "https://api.github.com/repos/$repo/discussions"
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = "application/vnd.github.v3+json" }
          $result = Invoke-RestMethod -Uri $url -Headers $headers
          $result | Format-Table id, title, html_url

      - name: Update discussion body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql \
          -f query='mutation($id: ID!, $body: String!) {
              updateDiscussion(input: { discussionId: $id, body: $body }) {
                discussion { id }
              }
            }' \
            -f id="D_kwDOCsJEA84AkUSH" \
            -f body="$(cat body.md)"
